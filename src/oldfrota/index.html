<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#040C19">
    <meta name="background-color" content="#040C19">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <title>Frotacontrol</title>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Verificar se o usuário está logado
            const usuarioLogado = localStorage.getItem('usuario');
            if (usuarioLogado) {
                // Redirecionar para a página principal do app
                window.location.href = 'layout_home.html'; // Substitua 'main.html' pela página principal do seu app
            } else {
                // Redirecionar para a splashscreen
                window.location.href = 'layout_login.html';
            }
        });
    </script>
</head>
<body>
</body>
</html>

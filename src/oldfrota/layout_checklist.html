<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#040C19">
    <title>Checklist</title>
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
    <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Questrial', sans-serif;
        }
        body {
            background-color: #dbdbdb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #0f2954;
            color: #D9EAFA;
            padding: 15px;
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .back-button {
            background: none;
            border: none;
            cursor: pointer;
        }
        .back-button img {
            width: 28px;
            height: 28px;
        }
        .container {
            text-align: center;
            margin-top: 50px;
        }
        .btn {
            margin: 20px;
            padding: 15px 30px;
            font-family: 'Questrial', sans-serif;
            background-color: #0f2954;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #1a3b6e;
        }
        /* Estilos para Honda */
        .honda-theme header {
            background-color: #f32121 !important;
        }
        .honda-theme .btn {
            background-color: #f32121;
        }
        .honda-theme .btn:hover {
            background-color: #c81b1b;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-row">
            <button class="back-button" onclick="window.history.back()">
                <img src="assets/icon_arrow.svg" alt="Voltar">
            </button>
        </div>
    </header>
    <main>
        <div class="container">
            <button class="btn" onclick="window.location.href='layout_preencher_checklist.html'">PREENCHER CHECKLIST</button>
            <button class="btn" onclick="window.location.href='layout_visualisar_checklist.html'">CONSULTAR CHECKLIST</button>
        </div>
    </main>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const usuario = JSON.parse(localStorage.getItem('usuario'));
            if (usuario && usuario.empresa === 'HONDA') {
                document.body.classList.add('honda-theme');
                document.querySelector('meta[name="theme-color"]').content = '#f32121';
            } else if (usuario && usuario.empresa === 'LSL') {
                document.body.classList.remove('honda-theme');
                document.querySelector('meta[name="theme-color"]').content = '#0f2954';
            }
        });
    </script>
</body>
</html>
